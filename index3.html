<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script src="min.js"></script>
<link rel="stylesheet" href="min.css" />

    <div class="card">
        <h2>Знайти мінімальне</h2>
        
        <div class="input-field">
            <label for="num1">Число А</label>
            <input type="number" id="num1" placeholder="Введіть перше число">
        </div>

        <div class="input-field">
            <label for="num2">Число B</label>
            <input type="number" id="num2" placeholder="Введіть друге число">
        </div>

        <div class="input-field">
            <label for="num3">Число C</label>
            <input type="number" id="num3" placeholder="Введіть третє число">
        </div>

        <button id="btnCalculate">Обчислити</button>

        <div class="result-box">
            <p>Результат: <span id="result">---</span></p>
        </div>
    </div>
</body>
</html>
